<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحت الصيانة</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* يخلي المحتوى في نص الشاشة بالظبط */
            background-color: #f4f6f9; /* لون خلفية هادي */
            font-family: Arial, sans-serif;
            text-align: center;
        }
        
        .container {
            padding: 20px;
        }

        .emoji {
            font-size: 15vw; /* حجم الإيموشن عملاق ومتجاوب */
            display: block;
            margin-bottom: 20px;
            animation: bounce 2s infinite; /* حركة تنطيط خفيفة للإيموشن */
        }

        h1 {
            font-size: 10vw; /* حجم الخط ضخم جداً ومتجاوب مع الشاشة */
            color: #272424;
            margin: 0;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.1);
        }

        /* حركة بسيطة للإيموشن عشان تلفت الانتباه */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-30px);}
            60% {transform: translateY(-15px);}
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="emoji">😂</span>
        <h1>سنعود قريباً!</h1>
    </div>

</body>
</html>
